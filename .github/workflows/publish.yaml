name: "Build & Publish"

# This workflow builds the package and optionally publishes releases.
# - On PRs: Builds only (verifies the package builds correctly)
# - On manual dispatch: Can create a pre-release from any branch
# - On version tags: Creates a GitHub release

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release?'
        required: true
        default: true
        type: boolean
      release_type:
        description: 'Release type (only if creating release)'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease
          - release

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      branch_suffix: ${{ steps.get_branch.outputs.suffix }}
    steps:
    - name: Check out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: false

    - name: Get version from pyproject.toml
      id: get_version
      run: |
        VERSION=$(grep -m1 'version = ' pyproject.toml | cut -d'"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Package version: $VERSION"

    - name: Get branch suffix for pre-releases
      id: get_branch
      run: |
        if [[ "${GITHUB_REF}" == refs/heads/* ]]; then
          BRANCH="${GITHUB_REF_NAME}"
          # Sanitize branch name for use in version
          SUFFIX=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | cut -c1-20)
          echo "suffix=-${SUFFIX}" >> $GITHUB_OUTPUT
          echo "Branch suffix: -${SUFFIX}"
        else
          echo "suffix=" >> $GITHUB_OUTPUT
        fi

    - name: Build package
      run: uv build

    - name: List build artifacts
      run: ls -la dist/

    - name: Upload build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: dist
        path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    permissions:
      contents: write # to create releases and upload artifacts
    steps:
    - name: Check out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: dist
        path: dist/

    - name: List downloaded artifacts
      run: ls -la dist/

    - name: Determine release tag
      id: release_tag
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          # Use the pushed tag
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        else
          # Create tag from version + branch for pre-releases from branches
          VERSION="${NEEDS_BUILD_OUTPUTS_VERSION}"
          SUFFIX="${NEEDS_BUILD_OUTPUTS_BRANCH_SUFFIX}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          TAG="v${VERSION}${SUFFIX}-${TIMESTAMP}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "name=${TAG}" >> $GITHUB_OUTPUT
          echo "Creating release with tag: ${TAG}"
        fi
      env:
        NEEDS_BUILD_OUTPUTS_VERSION: ${{ needs.build.outputs.version }}
        NEEDS_BUILD_OUTPUTS_BRANCH_SUFFIX: ${{ needs.build.outputs.branch_suffix }}

    # For tag-triggered releases
    - name: Create Release (from tag)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        PRERELEASE_FLAG=""
        if [[ "${GITHUB_REF}" == *"-alpha"* ]] || [[ "${GITHUB_REF}" == *"-beta"* ]] || [[ "${GITHUB_REF}" == *"-rc"* ]]; then
          PRERELEASE_FLAG="--prerelease"
        fi
        gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes $PRERELEASE_FLAG
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # For manual workflow dispatch (from any branch)
    - name: Create Release (manual)
      if: github.event_name == 'workflow_dispatch'
      run: |
        PRERELEASE_FLAG=""
        if [[ "${MANUAL_RELEASE_TYPE}" == "prerelease" ]]; then
          PRERELEASE_FLAG="--prerelease"
        fi
        gh release create "${MANUAL_RELEASE_TAG}" dist/* \
          --title "${MANUAL_RELEASE_NAME}" \
          --target "${GITHUB_SHA}" \
          --notes "Pre-release build from branch \`${GITHUB_REF_NAME}\`

        Commit: ${GITHUB_SHA}

        ⚠️ This is a development pre-release and may not be stable." \
          $PRERELEASE_FLAG
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        MANUAL_RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        MANUAL_RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        MANUAL_RELEASE_NAME: ${{ steps.release_tag.outputs.name }}
